  <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">




  <style id="splash-screen-style">
    html {
      height: 100%
    }

    body {
      margin: 0;
      min-height: 100%;
      background-color: #201a1b;
          background-size: 100% 100%;
    }

    .center {
      margin: 0;
      position: absolute;
      top: 50%;
      left: 50%;
      -ms-transform: translate(-50%, -50%);
      transform: translate(-50%, -50%);
    }

    .contain {
      display:block;
      width:100%; height:100%;
      object-fit: contain;
    }

    .stretch {
      display:block;
      width:100%; height:100%;
    }

    .cover {
      display:block;
      width:100%; height:100%;
      object-fit: cover;
    }

    .bottom {
      position: absolute;
      bottom: 0;
      left: 50%;
      -ms-transform: translate(-50%, 0);
      transform: translate(-50%, 0);
    }

    .bottomLeft {
      position: absolute;
      bottom: 0;
      left: 0;
    }

    .bottomRight {
      position: absolute;
      bottom: 0;
      right: 0;
    }

    #focus-pwa-install {
      position: fixed;
      inset: 0;
      z-index: 100000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 16px;
      background: rgba(0, 0, 0, 0.55);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    .focus-pwa-card {
      width: min(420px, 100%);
      background: #201a1b;
      color: #f5f0f1;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
    }

    .focus-pwa-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .focus-pwa-title {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 600;
    }

    .focus-pwa-body {
      margin: 0 0 12px;
      line-height: 1.45;
      color: rgba(245, 240, 241, 0.88);
    }

    .focus-pwa-steps {
      margin: 0 0 16px 18px;
      padding: 0;
      color: rgba(245, 240, 241, 0.88);
      line-height: 1.5;
    }

    .focus-pwa-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .focus-pwa-btn {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .focus-pwa-btn-primary {
      background: #e57373;
      color: #201a1b;
    }

    .focus-pwa-btn-secondary {
      background: rgba(255, 255, 255, 0.12);
      color: #f5f0f1;
    }

    .focus-pwa-btn-ghost {
      background: transparent;
      color: rgba(245, 240, 241, 0.72);
    }
  </style>
  <script id="splash-screen-script">
    function removeSplashFromWeb() {
      document.getElementById("splash")?.remove();
      document.getElementById("splash-branding")?.remove();
      document.body.style.background = "transparent";
    }
  </script>
</head>

<body>
  <picture id="splash">
      <source srcset="splash/img/light-1x.png 1x, splash/img/light-2x.png 2x, splash/img/light-3x.png 3x, splash/img/light-4x.png 4x" media="(prefers-color-scheme: light)">
      <source srcset="splash/img/dark-1x.png 1x, splash/img/dark-2x.png 2x, splash/img/dark-3x.png 3x, splash/img/dark-4x.png 4x" media="(prefers-color-scheme: dark)">
      <img class="center" aria-hidden="true" src="splash/img/light-1x.png" alt="">
  </picture>



  <script src="pwa_install_prompt.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.getRegistrations().then(function (registrations) {
          registrations.forEach(function (registration) {
            if (registration.active &&
                registration.active.scriptURL.includes('flutter_service_worker.js')) {
              registration.unregister();
            }
          });
        });
        navigator.serviceWorker.register('pwa_service_worker.js');
      });
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>




</body></html>
