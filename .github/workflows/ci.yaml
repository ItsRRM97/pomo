name: CI Quality Assurance

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  verify:
    name: Build, Analyze, and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter SDK
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          channel: 'stable'
          cache: true

      - name: Install Linux System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgstreamer1.0-dev libgtk-3-dev liblzma-dev clang cmake ninja-build pkg-config

      - name: Fetch Dependencies
        run: flutter pub get

      - name: Generate Localization Accessors
        run: flutter gen-l10n --arb-dir="lib/l10n/arb"

      - name: Verify Dart Code Formatting
        run: dart format --output=none --set-exit-if-changed lib/ test/ scripts/

      - name: Run Static Analysis (very_good_analysis)
        run: flutter analyze --no-fatal-infos

      - name: Run Automated Regression Suite
        run: flutter test --flavor development --coverage
